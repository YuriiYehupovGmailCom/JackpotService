spring:
  datasource:
    url: jdbc:h2:mem:jackpotdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
    consumer:
      group-id: jackpot-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.sporty.jackpotservice.domain.BetPayload
        spring.json.trusted.packages: com.sporty.jackpotservice.domain

jackpot:
  defaults:
    jackpots:
      - id: JACKPOT-1
        initialPoolAmount: 1000
        contributionType: FIXED
        fixedContributionPercentage: 5
        rewardType: FIXED
        fixedRewardChancePercentage: 1
      - id: JACKPOT-2
        initialPoolAmount: 120
        contributionType: FIXED
        fixedContributionPercentage: 100
        rewardType: VARIABLE
        variableRewardBaseChancePercentage: 0
        variableRewardIncreaseRatePercentage: 0
        variableRewardIncreaseStep: 1
        variableRewardGuaranteedPoolLimit: 150
